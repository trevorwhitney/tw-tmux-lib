# vi: ft=tmux
# -- general -------------------------------------------------------------------

setw -g xterm-keys on
set -sg repeat-time 600                   # increase repeat timeout
set -g mouse on                           # start with mouse mode enabled
set -g display-panes-time 1000            # increase panes display time a bit more than the 800 default provided by oh-my-zsh
set -g allow-passthrough on               # allow keys to pass through to terminal application when not handled by tmux

# -- status bar
set -g status-position bottom
set -g status-interval 1
set -g status-left-length 150
set -g status-right ""
set -g status-style "default"
set -g status-bg default
set -g status-fg default

# Window status alignment
set -g status-justify right

# Status left: time | hostname | git branch | desc (if set) | session
set -g status-left-style "default"
set -g status-left "%H:%M:%S | 󰟀 #(hostname) | #{git_status}| #{?@desc,#{@desc} | ,}󱎂 #S "

# Window status
set -g window-status-format " #[bold]#I #[nobold]#W "
set -g window-status-current-format " #[bold]#I #W "
set -g window-status-current-style "bold,fg=colour4,reverse"
set -g window-status-activity-style "default"
set -g window-status-separator " | "

# Pane borders
set -g pane-border-style "default"
set -g pane-active-border-style "bold"

# Messages and mode
set -g message-style "default"
set -g message-command-style "default"
set -g mode-style "reverse"

# Pane number indicator
set -g display-panes-colour "default"
set -g display-panes-active-colour "default"

# Clock
set -g clock-mode-style 24

set -qg status-utf8 on                  # expect UTF-8 (tmux < 2.2)
setw -qg utf8 on

# reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf sourced'

# -- display -------------------------------------------------------------------

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title
set -g set-titles-string "#T"

set -g display-panes-time 800 # slightly longer pane indicators display time

# Pane border
set -g pane-border-indicators "both"
set -g pane-border-lines "heavy"

# clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# activity
set -g monitor-activity off
set -g monitor-bell off
set -g visual-activity off

set-option -sa terminal-overrides ',xterm-256color:RGB'
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-features ",xterm-ghostty:clipboard:ccolour:cstyle:focus:title:usstyle"

# -- navigation ----------------------------------------------------------------

# jump to session
bind C-j display-popup -E "tmux list-sessions -F \"#S\" | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
# jump to window
bind C-h display-popup -E "tmux list-windows -F \"#W\" | grep -v \"^$(tmux display-message -p '#W')\$\" | fzf --reverse | xargs tmux select-window -t"

# C-d also detaches
bind C-d detach

# set pane description (shown in status bar when set)
bind C-t command-prompt -p "pane description:" "set -p @desc '%%'"

# split current window horizontally
bind - split-window -v -c "#{pane_current_path}" -l 20
# split current window vertically
bind _ split-window -h -c "#{pane_current_path}"
# other keybinding
bind | split-window -h -c "#{pane_current_path}"

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# rebind x to kill-pane without prompt
bind-key x kill-pane

# show panes by number
bind q display-panes

# send raw C-q to the pane (prefix C-q)
bind C-q send-prefix

# window navigation
unbind n
unbind p
unbind [

bind -r C-p previous-window   # select previous window
bind -r C-n next-window       # select next window
bind -r [ previous-window     # alt for select previous window
bind -r ] next-window         # alt for select next window

bind v copy-mode # rebind copy mode to v

# ! to break, @ to join
bind @ choose-window 'join-pane -h -s "%%"'

bind Tab last-window        # move to last active window

# -- list choice (tmux < 2.4) --------------------------------------------------

# vi-choice is gone in tmux >= 2.4
run -b 'tmux bind -t vi-choice h tree-collapse 2> /dev/null || true'
run -b 'tmux bind -t vi-choice l tree-expand 2> /dev/null || true'
run -b 'tmux bind -t vi-choice K start-of-list 2> /dev/null || true'
run -b 'tmux bind -t vi-choice J end-of-list 2> /dev/null || true'
run -b 'tmux bind -t vi-choice H tree-collapse-all 2> /dev/null || true'
run -b 'tmux bind -t vi-choice L tree-expand-all 2> /dev/null || true'
run -b 'tmux bind -t vi-choice Escape cancel 2> /dev/null || true'


# -- edit mode (tmux < 2.4) ----------------------------------------------------

# vi-edit is gone in tmux >= 2.4
run -b 'tmux bind -ct vi-edit H start-of-line 2> /dev/null || true'
run -b 'tmux bind -ct vi-edit L end-of-line 2> /dev/null || true'
run -b 'tmux bind -ct vi-edit q cancel 2> /dev/null || true'
run -b 'tmux bind -ct vi-edit Escape cancel 2> /dev/null || true'

# -- buffers -------------------------------------------------------------------

bind b list-buffers  # list paste buffers
bind p paste-buffer  # paste from the top paste buffer
bind P choose-buffer # choose which buffer to paste from

# ========= Vim <3 Tmux ============
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
| grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

is_fzf="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?fzf$'"

bind -n C-h run "($is_vim && tmux send-keys C-h) || \
                          tmux select-pane -L"

bind -n C-j run "($is_vim && tmux send-keys C-j)  || \
                         ($is_fzf && tmux send-keys C-j) || \
                         tmux select-pane -D"

bind -n C-k run "($is_vim && tmux send-keys C-k) || \
                          ($is_fzf && tmux send-keys C-k)  || \
                          tmux select-pane -U"

bind -n C-l run  "($is_vim && tmux send-keys C-l) || \
                          tmux select-pane -R"

# Preserve original key bindings under prefix
bind -r C-k send-keys C-k # used to send kill signal in k9s
bind -r C-l send-keys C-l # used to clear terminal

# workmux dashboard
bind C-s display-popup -h 30 -w 100 -E "workmux dashboard"
